{{ define "main" }}
<main class="commonMain singleMain">
  <article class="commonArticle singleArticle">
    <section class="titleSection">
      <h1 class="title">{{ .Title }}</h1>
      <a href="{{ .Site.BaseURL }}" class="backToHome" title="返回主页">← 返回主页</a>
    </section>
    <section class="content">
      {{ .Content }}
    </section>
    <section class="placeholder">
    </section>
  </article>
  <aside class="commonRightSide singleRightSide">
    <section class="tocContainer">
    {{ .TableOfContents }}
    </section>
  </aside>
</main>

<button id="backToTopBtn" class="backToTopBtn" title="返回文章开头">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="18 15 12 9 6 15"></polyline>
  </svg>
</button>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const backToTopBtn = document.getElementById('backToTopBtn');
  const titleSection = document.querySelector('.titleSection');
  const scrollContainer = document.querySelector('.commonMain');

  if (backToTopBtn && titleSection && scrollContainer) {
    function updateButtonPosition() {
      const tocContainer = document.querySelector('.singleRightSide');
      if (tocContainer && window.innerWidth > 1024) {
        const tocRect = tocContainer.getBoundingClientRect();
        backToTopBtn.style.left = tocRect.left + 'px';
        backToTopBtn.style.right = 'auto';
      } else {
        backToTopBtn.style.left = 'auto';
        backToTopBtn.style.right = '1.5em';
      }
    }

    function toggleBackToTopButton() {
      const titleBottom = titleSection.offsetTop + titleSection.offsetHeight;
      const scrollTop = scrollContainer.scrollTop;

      if (scrollTop > titleBottom) {
        backToTopBtn.classList.add('show');
        updateButtonPosition();
      } else {
        backToTopBtn.classList.remove('show');
      }
    }

    backToTopBtn.addEventListener('click', function() {
      scrollContainer.scrollTo({
        top: 0,
        behavior: 'smooth'
      });
    });

    window.addEventListener('resize', updateButtonPosition);
    scrollContainer.addEventListener('scroll', toggleBackToTopButton);

    updateButtonPosition();
    toggleBackToTopButton();
  }
});
</script>
{{ end }}
